<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎁 Tu Destino</title>

<!-- Monetag SDK (لا يتم تعديله) -->
<script src="//libtl.com/sdk.js" data-zone="11092709" data-sdk="show_11092709"></script>

<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  text-align: center;
  margin: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
}

#container {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

h1 { margin-top: 20px; }

/* تنسيق شخصية 3D والفقاعة الكلامية */
#character-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: 10px;
  position: relative;
}

#charImage {
  width: 150px;
  height: auto;
  border-radius: 50%; /* شكل دائري بسيط */
  border: 4px solid white;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  transition: opacity 0.5s ease; /* انقال ناعم بين الصور */
}

#charSpeech {
  background-color: white;
  padding: 10px 15px;
  border-radius: 20px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  font-size: 18px;
  font-weight: bold;
  color: #ff4d6d;
  margin-bottom: 15px;
  max-width: 250px;
  position: relative;
  opacity: 1;
  transition: opacity 0.3s ease;
}

/* مثلث الفقاعة الكلامية */
#charSpeech::after {
  content: '';
  position: absolute;
  bottom: -10px;
  left: 50%;
  transform: translateX(-50%);
  border-width: 10px 10px 0;
  border-style: solid;
  border-color: white transparent transparent;
}


button {
  padding: 15px 30px;
  font-size: 18px;
  border: none;
  border-radius: 50px;
  background: #ff4d6d;
  color: white;
  cursor: pointer;
}

.boxes {
  display: none;
  margin-top: 30px;
  justify-content: center;
  gap: 15px;
  flex-wrap: wrap;
}

.box {
  width: 80px;
  height: 80px;
  background: #fff;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 25px;
  cursor: pointer;
}

.result {
  margin-top: 20px;
  font-size: 20px;
  font-weight: bold;
  min-height: 1.2em; /* حجز مساحة للنتيجة */
}

/* تنسيق التوقيع (Footer) */
footer {
  width: 100%;
  padding: 15px 0;
  background-color: rgba(255, 255, 255, 0.3);
  font-size: 14px;
  color: #333;
  margin-top: auto; /* يدفعه لأسفل */
}
</style>
</head>

<body>

<div id="container">
  
  <!-- منطقة الشخصية: الصورة والفقاعة -->
  <div id="character-area">
    <div id="charSpeech">¡Bienvenido/a!</div>
    <img id="charImage" src="image_0.png" alt="Friendly 3D Girl">
  </div>

  <h1>🎡 ¡Descubre tu destino!</h1>

  <button id="start">Girar</button>

  <div class="boxes" id="boxes">
    <div class="box">🎁</div>
    <div class="box">🎁</div>
    <div class="box">🎁</div>
    <div class="box">🎁</div>
  </div>

  <div class="result" id="result"></div>

</div>

<!-- التوقيع (Footer) -->
<footer>@Bigbanglive_bot</footer>

<script>
const start = document.getElementById("start");
const boxes = document.getElementById("boxes");
const result = document.getElementById("result");
const charImage = document.getElementById("charImage");
const charSpeech = document.getElementById("charSpeech");

const rewards = [
  "💖 Amor verdadero",
  "💰 Dinero inesperado",
  "🍀 Mucha suerte",
  "🔥 Éxito total"
];

// ✅ إعلان خفيف (In-App) بعد 5 ثواني (لا يتم تعديله)
setTimeout(() => {
  if (typeof show_11092709 === "function") {
    show_11092709({
      type: 'inApp',
      inAppSettings: {
        frequency: 1,
        capping: 0.2,
        interval: 60,
        timeout: 5,
        everyPage: false
      }
    });
  }
}, 5000);

// 🎡 زر البداية
start.onclick = () => {
  boxes.style.display = "flex";
  start.style.display = "none";
  
  // تغيير حالة الشخصية عند الضغط
  // الانتقال إلى image_1.png (تساؤل ومواساة)
  charImage.style.opacity = 0; // إخفاء مؤقت للانتقال
  charSpeech.style.opacity = 0;

  setTimeout(() => {
    charImage.src = "image_1.png"; // تغيير الصورة
    charSpeech.innerText = "¿Qué te espera? (Sea lo que sea, estoy contigo.)"; // تغيير النص والمواساة
    charImage.style.opacity = 1; // إظهار الصورة الجديدة
    charSpeech.style.opacity = 1;
  }, 300); // وقت قصير للانتقال الناعم
};

// 🎁 عند الضغط على صندوق
document.querySelectorAll(".box").forEach(box => {
  box.onclick = () => {

    let random = rewards[Math.floor(Math.random() * rewards.length)];
    result.innerText = "Tu destino: " + random;

    // ✅ إعلان واحد فقط بعد click (safe) (لا يتم تعديله)
    if (typeof show_11092709 === "function") {
      show_11092709().catch(()=>{});
    }

    // ❌ مهم: ما تستعملش popup + rewarded مع بعض
  };
});
</script>

</body>
</html>
