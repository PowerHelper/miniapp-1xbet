<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✨ Tu Destino Mágico ✨</title>

<!-- خطوط احترافية -->
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;800;900&display=swap" rel="stylesheet">

<!-- مكتبة جوجل 3D -->
<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.1.1/model-viewer.min.js"></script>

<!-- مكتبة الاحتفال -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<!-- Monetag SDK (مضمون 100%) -->
<script src="https://libtl.com/sdk.js" data-zone="11092709" data-sdk="show_11092709"></script>

<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Montserrat', sans-serif;
  }

  body {
    background: radial-gradient(circle at top, #2b0f4c 0%, #0a0514 100%);
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
    position: relative;
  }

  /* شبكة متحركة 3D فالخلفية */
  body::before {
    content: '';
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background-image: 
      linear-gradient(rgba(0, 242, 254, 0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0, 242, 254, 0.05) 1px, transparent 1px);
    background-size: 30px 30px;
    z-index: -1;
    animation: moveGrid 10s linear infinite;
    transform: perspective(500px) rotateX(60deg);
    transform-origin: top;
    opacity: 0.6;
  }

  @keyframes moveGrid {
    0% { background-position: 0 0; }
    100% { background-position: 0 30px; }
  }

  #anime-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-top: 15px;
    z-index: 10;
  }

  .pedestal {
    position: relative;
    display: flex;
    justify-content: center;
  }

  .pedestal::after {
    content: '';
    position: absolute;
    bottom: 5px;
    width: 160px;
    height: 15px;
    background: #ff007a;
    border-radius: 50%;
    filter: blur(20px);
    z-index: -1;
    animation: glowPulse 2s infinite alternate;
  }

  @keyframes glowPulse {
    0% { transform: scale(1); opacity: 0.6; }
    100% { transform: scale(1.3); opacity: 1; }
  }

  model-viewer {
    width: 240px;
    height: 260px;
    background-color: transparent;
    border: none;
    outline: none;
    filter: drop-shadow(0 0 20px rgba(255, 0, 122, 0.4));
  }

  .clap-anim {
    animation: jumpJoy 0.5s ease-in-out 2;
  }

  @keyframes jumpJoy {
    0% { transform: translateY(0); }
    50% { transform: translateY(-20px); }
    100% { transform: translateY(0); }
  }

  /* فقاعة النص ستايل نيون */
  .bubble {
    background: rgba(10, 5, 20, 0.7);
    backdrop-filter: blur(10px);
    border: 2px solid #00f2fe;
    color: #fff;
    padding: 10px 25px;
    border-radius: 15px;
    font-size: 16px;
    font-weight: 800;
    margin-bottom: 10px;
    text-align: center;
    box-shadow: 0 0 20px rgba(0, 242, 254, 0.5);
    text-transform: uppercase;
    letter-spacing: 1px;
    min-width: 250px;
  }

  /* عداد 10 ثواني (تصميم مميز) */
  #timer-display {
    color: #ff007a;
    font-size: 22px;
    font-weight: 900;
    text-shadow: 0 0 10px #ff007a;
  }

  #progress-container {
    width: 90%;
    max-width: 400px;
    height: 10px;
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
    margin: 10px 0;
    display: none;
    overflow: hidden;
    box-shadow: inset 0 0 5px #000;
  }

  #progress-bar {
    width: 0%;
    height: 100%;
    background: linear-gradient(90deg, #ff0844, #ffb199);
    box-shadow: 0 0 15px #ff0844;
    transition: width 0.4s ease;
  }

  #game-board {
    background: rgba(255, 255, 255, 0.02);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    padding: 12px;
    border-radius: 15px;
    border: 1px solid rgba(255, 255, 255, 0.05);
    box-shadow: 0 10px 40px rgba(0,0,0,0.5), inset 0 0 20px rgba(0, 242, 254, 0.1);
    margin: 5px 0 20px 0;
    display: none;
    grid-template-columns: repeat(8, 1fr);
    gap: 8px;
    perspective: 1000px; /* ضروري للـ 3D */
  }

  @media (max-width: 600px) {
    #game-board {
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      padding: 10px;
    }
  }

  /* البطاقات - الحل النهائي لمشكل الانفتاح فكاع التليفونات */
  .card {
    width: 50px;
    height: 50px;
    cursor: pointer;
    position: relative;
    transform-style: preserve-3d;
    -webkit-transform-style: preserve-3d;
    transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  @media (max-width: 600px) {
    .card { width: 55px; height: 55px; }
  }

  /* ملي كتاخد كلاس is-flipped كدور بـ 180 درجة */
  .card.is-flipped {
    transform: rotateY(180deg);
    -webkit-transform: rotateY(180deg);
  }

  .card.matched {
    animation: matchGlow 0.6s ease forwards;
  }

  @keyframes matchGlow {
    0% { transform: rotateY(180deg) scale(1); }
    50% { transform: rotateY(180deg) scale(1.15); box-shadow: 0 0 20px #00f2fe; border-radius: 10px; }
    100% { transform: rotateY(180deg) scale(0.95); opacity: 0.5; }
  }

  .card-face {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 10px;
    font-size: 26px;
  }

  /* وجه البطاقة (علامة ؟) - كيكون فـ 0 درجة */
  .card-front {
    background: linear-gradient(135deg, rgba(0, 242, 254, 0.1), rgba(0, 242, 254, 0.05));
    border: 2px solid rgba(0, 242, 254, 0.3);
    color: #00f2fe;
    font-size: 24px;
    font-weight: 900;
    box-shadow: inset 0 0 10px rgba(0, 242, 254, 0.2);
    transform: rotateY(0deg);
    -webkit-transform: rotateY(0deg);
  }

  /* ظهر البطاقة (الشكل دالديسير) - كيكون فـ 180 درجة ديجا */
  .card-back {
    background: #fff;
    transform: rotateY(180deg);
    -webkit-transform: rotateY(180deg);
    border: 2px solid #ff007a;
    box-shadow: inset 0 0 15px rgba(255, 0, 122, 0.2), 0 0 10px rgba(255, 0, 122, 0.5);
  }

  #start-btn {
    padding: 15px 40px;
    font-size: 20px;
    font-weight: 900;
    border: none;
    border-radius: 30px;
    background: linear-gradient(90deg, #ff0844, #ffb199);
    color: white;
    cursor: pointer;
    box-shadow: 0 5px 20px rgba(255, 8, 68, 0.6);
    margin-top: 10px;
    z-index: 20;
    text-transform: uppercase;
    transition: 0.3s;
    animation: btnPulse 2s infinite;
  }

  #start-btn:hover {
    transform: scale(1.1);
    box-shadow: 0 10px 30px rgba(255, 8, 68, 0.9);
  }

  @keyframes btnPulse {
    0% { box-shadow: 0 0 0 0 rgba(255, 8, 68, 0.7); }
    70% { box-shadow: 0 0 0 15px rgba(255, 8, 68, 0); }
    100% { box-shadow: 0 0 0 0 rgba(255, 8, 68, 0); }
  }

  footer {
    margin-top: auto;
    padding: 15px;
    font-size: 13px;
    font-weight: bold;
    color: rgba(255, 255, 255, 0.3);
    letter-spacing: 2px;
  }
</style>
</head>
<body>

  <div id="anime-container">
    <div class="bubble" id="speech-bubble">
      ¡Toca para empezar! ✨
    </div>
    
    <div class="pedestal">
      <model-viewer 
        id="anime-model"
        src="https://modelviewer.dev/shared-assets/models/RobotExpressive.glb" 
        autoplay
        interaction-prompt="none"
        camera-controls="false"
        disable-zoom>
      </model-viewer>
    </div>
  </div>

  <button id="start-btn">¡JUGAR AHORA!</button>

  <div id="progress-container">
    <div id="progress-bar"></div>
  </div>

  <div id="game-board"></div>

  <footer>@Bigbanglive_bot</footer>

<script>
  const startBtn = document.getElementById("start-btn");
  const gameBoard = document.getElementById("game-board");
  const speechBubble = document.getElementById("speech-bubble");
  const animeModel = document.getElementById("anime-model");
  const progressContainer = document.getElementById("progress-container");
  const progressBar = document.getElementById("progress-bar");
  
  const shapes = ['🍎','🍌','🍇','🍉','🍓','🍒','🍑','🥭','🍍','🥥','🥝','🍅','🍆','🥑','🥦','🌽','🥕','🥔','🍠','🥐'];
  let cardsArray = [...shapes, ...shapes];
  
  let firstCard = null;
  let secondCard = null;
  let lockBoard = false;
  let matchesFound = 0;
  const totalMatches = 20;

  // 🎵 نظام صوتي مبرمج (بدون ملفات mp3 باش يخدم فكاع الهواتف)
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  
  function playSound(type) {
    if(audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    
    if(type === 'flip') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(400, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.1);
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
      osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    } 
    else if(type === 'match') {
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(600, audioCtx.currentTime);
      osc.frequency.setValueAtTime(800, audioCtx.currentTime + 0.1);
      gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
      osc.start(); osc.stop(audioCtx.currentTime + 0.3);
    }
  }

  // 🔊 نطق الصوت بالاسبانية
  function speak(text, lang) {
    try {
      if ('speechSynthesis' in window) {
        let msg = new SpeechSynthesisUtterance();
        msg.text = text; msg.lang = lang; msg.rate = 1.1; msg.pitch = 1.5;
        window.speechSynthesis.speak(msg);
      }
    } catch(e) {}
  }

  // ✅ إعلان In-App بعد 5 ثواني
  setTimeout(() => {
    try {
      if (typeof show_11092709 === "function") {
        show_11092709({ type: 'inApp', inAppSettings: { frequency: 1, capping: 0.2, interval: 60, timeout: 5, everyPage: false }});
      }
    } catch(e) {}
  }, 5000);

  function initGame() {
    if(audioCtx.state === 'suspended') audioCtx.resume();

    startBtn.style.display = "none";
    gameBoard.style.display = "grid";
    progressContainer.style.display = "block";
    gameBoard.innerHTML = '';
    matchesFound = 0;
    updateProgress();
    lockBoard = true; // كنسدو اللعب باش مايكليكيش وهما باقين محلولين
    
    speak("Memoriza los pares rápido.", "es-ES");

    cardsArray.sort(() => Math.random() - 0.5);

    cardsArray.forEach((shape) => {
      const card = document.createElement("div");
      // 💡 كنعطيوهم is-flipped من الدقة الأولى باش يبانو محلولين لمدة 10 ثواني
      card.classList.add("card", "is-flipped"); 
      card.dataset.shape = shape;

      // وجه البطاقة (علامة الاستفهام ?)
      const cardFront = document.createElement("div");
      cardFront.classList.add("card-face", "card-front");
      cardFront.innerText = "?";

      // ظهر البطاقة (الشكل دالديسير)
      const cardBack = document.createElement("div");
      cardBack.classList.add("card-face", "card-back");
      cardBack.innerText = shape;

      card.appendChild(cardFront);
      card.appendChild(cardBack);
      
      card.addEventListener("click", () => flipCard(card));
      gameBoard.appendChild(card);
    });

    // ⏱️ كنبداو العداد ديال 10 ثواني
    startCountdown();
  }

  function startCountdown() {
    let timeLeft = 10;
    
    let countdownInterval = setInterval(() => {
      speechBubble.innerHTML = `¡Memoriza! <span id="timer-display">${timeLeft}</span>s`;
      timeLeft--;

      if (timeLeft < 0) {
        clearInterval(countdownInterval);
        hideAllCards(); // كنسدوهم ملي كيسالي الوقت
      }
    }, 1000);
  }

  function hideAllCards() {
    speak("¡A jugar!", "es-ES");
    speechBubble.innerHTML = "¡Encuentra los pares! 🎮";
    const allCards = document.querySelectorAll('.card');
    
    // 💡 كنحيدو كلاس is-flipped باش يتقلبو لعلامة (?)
    allCards.forEach(card => card.classList.remove('is-flipped'));
    
    lockBoard = false; // دابا يقدر يكليكي ويلعب
  }

  function flipCard(card) {
    if (lockBoard || card === firstCard || card.classList.contains('matched')) return;

    playSound('flip');

    // ✅ إعلان Monetag مع كل كليكة (الربح مضمون)
    try { if (typeof show_11092709 === "function") show_11092709(); } catch(e) {}

    card.classList.add('is-flipped'); // كنحلو البطاقة

    if (!firstCard) {
      firstCard = card;
      return;
    }

    secondCard = card;
    checkForMatch();
  }

  function checkForMatch() {
    let isMatch = firstCard.dataset.shape === secondCard.dataset.shape;

    if (isMatch) {
      disableCards();
      matchesFound++;
      updateProgress();
      
      speechBubble.innerHTML = "¡Excelente! ✨";
      playSound('match');
      speak("¡Bravo!", "es-ES");

      animeModel.classList.remove('clap-anim');
      void animeModel.offsetWidth;
      animeModel.classList.add('clap-anim');

      if(matchesFound === totalMatches) {
        setTimeout(() => {
          speechBubble.innerHTML = "¡Ayo ayo, arigato! 🏆";
          speak("Ayo ayo, arigato gozaimasu", "ja-JP");
          fireConfetti();
        }, 500);
      }
    } else {
      unflipCards();
    }
  }

  function updateProgress() {
    let percentage = (matchesFound / totalMatches) * 100;
    progressBar.style.width = percentage + "%";
  }

  function fireConfetti() {
    try {
      var duration = 4000; var end = Date.now() + duration;
      (function frame() {
        confetti({ particleCount: 7, angle: 60, spread: 70, origin: { x: 0 }, colors: ['#00f2fe', '#ff007a', '#ffffff'] });
        confetti({ particleCount: 7, angle: 120, spread: 70, origin: { x: 1 }, colors: ['#00f2fe', '#ff007a', '#ffffff'] });
        if (Date.now() < end) requestAnimationFrame(frame);
      }());
    } catch(e) {}
  }

  function disableCards() {
    firstCard.classList.add('matched');
    secondCard.classList.add('matched');
    resetBoard();
  }

  function unflipCards() {
    lockBoard = true;
    setTimeout(() => {
      firstCard.classList.remove('is-flipped'); // كنسدوهم يلا كانو غالطين
      secondCard.classList.remove('is-flipped');
      resetBoard();
    }, 800);
  }

  function resetBoard() {
    [firstCard, secondCard, lockBoard] = [null, null, false];
  }

  startBtn.addEventListener("click", initGame);

</script>
</body>
</html>
