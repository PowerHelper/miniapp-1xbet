<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎁 Tu Destino</title>

<!-- خطوط جوجل لجمالية أكبر -->
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">

<!-- Monetag SDK (كود الإعلانات ديالك - ماتقيسوش) -->
<script src="//libtl.com/sdk.js" data-zone="11092709" data-sdk="show_11092709"></script>

<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Nunito', sans-serif;
  }

  body {
    background: linear-gradient(135deg, #1a0b2e, #4b1d52);
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  /* منطقة الأنمي والفقاعة */
  #anime-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-top: 20px;
    z-index: 10;
  }

  #anime-img {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid #ff4d6d;
    box-shadow: 0 0 20px rgba(255, 77, 109, 0.6);
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-10px); }
    100% { transform: translateY(0px); }
  }

  .bubble {
    background: rgba(255, 255, 255, 0.95);
    color: #333;
    padding: 15px 25px;
    border-radius: 20px;
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 15px;
    max-width: 90%;
    text-align: center;
    position: relative;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    transition: 0.3s;
  }

  .bubble::after {
    content: '';
    position: absolute;
    bottom: -10px;
    left: 50%;
    transform: translateX(-50%);
    border-width: 10px 10px 0;
    border-style: solid;
    border-color: rgba(255, 255, 255, 0.95) transparent transparent;
  }

  #timer {
    color: #ff4d6d;
    font-size: 24px;
    font-weight: 900;
  }

  /* شبكة الصناديق (40 صندوق) */
  #game-board {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(10px);
    padding: 20px;
    border-radius: 15px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    margin: 20px 0;
    display: none; /* مخفي حتى يبدأ اللعب */
    grid-template-columns: repeat(8, 1fr);
    gap: 8px;
    transition: transform 0.8s ease;
  }

  /* شكل وتجاوب الشبكة فالتليفون */
  @media (max-width: 600px) {
    #game-board {
      grid-template-columns: repeat(5, 1fr); /* 5 أعمدة فالتليفون باش يجي داكشي هو هداك */
      gap: 5px;
      padding: 10px;
    }
    .box {
      width: 55px !important;
      height: 55px !important;
      font-size: 24px !important;
    }
  }

  .box {
    width: 45px;
    height: 45px;
    background: linear-gradient(135deg, #ff9a9e, #fecfef);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    transition: all 0.3s;
  }

  .box:hover {
    transform: scale(1.1);
  }

  /* حركة التخربيق (Shuffle) */
  .shuffle-anim {
    animation: shake 0.8s ease-in-out;
  }

  @keyframes shake {
    0% { transform: rotate(0deg) scale(1); }
    25% { transform: rotate(5deg) scale(0.9); }
    50% { transform: rotate(-5deg) scale(1.05); }
    75% { transform: rotate(5deg) scale(0.9); }
    100% { transform: rotate(0deg) scale(1); }
  }

  #start-btn {
    padding: 15px 40px;
    font-size: 22px;
    font-weight: bold;
    border: none;
    border-radius: 50px;
    background: linear-gradient(45deg, #00f2fe, #4facfe);
    color: white;
    cursor: pointer;
    box-shadow: 0 5px 20px rgba(0, 242, 254, 0.4);
    margin-top: 20px;
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.05); }
    100% { transform: scale(1); }
  }

  footer {
    margin-top: auto;
    padding: 20px;
    font-size: 16px;
    font-weight: bold;
    color: rgba(255, 255, 255, 0.5);
    letter-spacing: 1px;
  }
</style>
</head>
<body>

  <div id="anime-container">
    <div class="bubble" id="speech-bubble">
      ¡Hola! ¿Listo para jugar? <br>Encuentra el diamante 💎
    </div>
    <!-- تقدر تبدل هاد الرابط بأي صورة أنمي بغيتيها -->
    <img id="anime-img" src="https://i.imgur.com/k2Bbd3g.png" alt="Anime Girl">
  </div>

  <button id="start-btn">¡Empezar!</button>

  <div id="game-board"></div>

  <footer>@Bigbanglive_bot</footer>

<script>
  const startBtn = document.getElementById("start-btn");
  const gameBoard = document.getElementById("game-board");
  const speechBubble = document.getElementById("speech-bubble");
  
  const TOTAL_BOXES = 40;
  let boxes = [];
  let isPlayable = false;

  // ✅ إعلان In-App بعد 5 ثواني (ماتقاصش)
  setTimeout(() => {
    if (typeof show_11092709 === "function") {
      show_11092709({
        type: 'inApp',
        inAppSettings: {
          frequency: 1,
          capping: 0.2,
          interval: 60,
          timeout: 5,
          everyPage: false
        }
      });
    }
  }, 5000);

  // إعداد اللعبة
  function initGame() {
    startBtn.style.display = "none";
    gameBoard.style.display = "grid";
    gameBoard.innerHTML = '';
    boxes = [];

    // إنشاء 40 صندوق (39 خاويين، 1 فيه الجائزة)
    let contentArray = Array(TOTAL_BOXES - 1).fill('🎁');
    contentArray.push('💎');
    
    // خلط أماكن الجائزة فالأول
    contentArray.sort(() => Math.random() - 0.5);

    contentArray.forEach((item, index) => {
      let box = document.createElement("div");
      box.className = "box";
      // فالبداية غنوريوهم شنو كاين لداخل
      box.innerText = item;
      box.dataset.content = item;
      box.dataset.index = index;
      
      box.addEventListener("click", () => handleBoxClick(box));
      gameBoard.appendChild(box);
      boxes.push(box);
    });

    startCountdown();
  }

  function startCountdown() {
    let timeLeft = 10;
    isPlayable = false; // اليوزر مايقدرش يكليكي دابا
    
    let countdownInterval = setInterval(() => {
      speechBubble.innerHTML = `¡Memoriza dónde está el 💎!<br>Tiempo: <span id="timer">${timeLeft}s</span>`;
      timeLeft--;

      if (timeLeft < 0) {
        clearInterval(countdownInterval);
        shuffleBoxes();
      }
    }, 1000);
  }

  function shuffleBoxes() {
    speechBubble.innerHTML = "¡Mezclando! 🌪️<br>¿Dónde está el 💎?";
    
    // إخفاء كلشي (كلشي كيولي صناديق مسدودة)
    boxes.forEach(box => {
      box.innerText = '📦';
      box.style.background = 'linear-gradient(135deg, #a18cd1, #fbc2eb)';
    });

    // حركة التخربيق (Animation)
    gameBoard.classList.add('shuffle-anim');

    setTimeout(() => {
      // إعادة خلط القيم داخليا باش اليوزر مايعرفش فين مشات
      let newValues = boxes.map(b => b.dataset.content).sort(() => Math.random() - 0.5);
      boxes.forEach((box, i) => {
        box.dataset.content = newValues[i];
      });

      gameBoard.classList.remove('shuffle-anim');
      speechBubble.innerHTML = "¡Tu turno! 🤔<br>Adivina dónde está.";
      isPlayable = true; // دابا يقدر يكليكي
    }, 800);
  }

  function handleBoxClick(box) {
    if (!isPlayable) return; // الا كليكا قبل الوقت مايوقع والو

    // ✅ استدعاء إعلان Monetag فكل ضغطة (safe)
    if (typeof show_11092709 === "function") {
      show_11092709().catch(()=>{});
    }

    // إظهار النتيجة
    let result = box.dataset.content;
    box.innerText = result;

    if (result === '💎') {
      box.style.background = '#ffd700'; // لون ذهبي للربح
      box.style.boxShadow = '0 0 20px #ffd700';
      speechBubble.innerHTML = "¡GANASTE! 🎉<br>¡Eres increíble!";
      isPlayable = false; // وقف اللعب ملي يربح
    } else {
      box.style.background = '#ff4d6d'; // لون أحمر للخسارة
      box.innerText = '❌';
      speechBubble.innerHTML = "¡Oh no! 😢<br>Ese no es. Intenta otra vez.";
    }
  }

  startBtn.addEventListener("click", initGame);

</script>
</body>
</html>
