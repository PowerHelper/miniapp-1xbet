<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎁 Tu Destino</title>

<!-- Monetag SDK -->
<script src="//libtl.com/sdk.js" data-zone="11092709" data-sdk="show_11092709"></script>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  text-align: center;
  margin: 0;
}

h1 { margin-top: 20px; }

button {
  padding: 15px 30px;
  font-size: 18px;
  border: none;
  border-radius: 50px;
  background: #ff4d6d;
  color: white;
  cursor: pointer;
}

.boxes {
  display: none;
  margin-top: 30px;
  justify-content: center;
  gap: 15px;
  flex-wrap: wrap;
}

.box {
  width: 80px;
  height: 80px;
  background: #fff;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 25px;
  cursor: pointer;
}

.result {
  margin-top: 20px;
  font-size: 20px;
  font-weight: bold;
}
</style>
</head>

<body>

<h1>🎡 ¡Descubre tu destino!</h1>

<button id="start">Girar</button>

<div class="boxes" id="boxes">
  <div class="box">🎁</div>
  <div class="box">🎁</div>
  <div class="box">🎁</div>
  <div class="box">🎁</div>
</div>

<div class="result" id="result"></div>

<script>
const start = document.getElementById("start");
const boxes = document.getElementById("boxes");
const result = document.getElementById("result");

const rewards = [
  "💖 Amor verdadero",
  "💰 Dinero inesperado",
  "🍀 Mucha suerte",
  "🔥 Éxito total"
];

// ✅ إعلان خفيف (In-App) بعد 5 ثواني
setTimeout(() => {
  if (typeof show_11092709 === "function") {
    show_11092709({
      type: 'inApp',
      inAppSettings: {
        frequency: 1,
        capping: 0.2,
        interval: 60,
        timeout: 5,
        everyPage: false
      }
    });
  }
}, 5000);

// 🎡 زر البداية
start.onclick = () => {
  boxes.style.display = "flex";
  start.style.display = "none";
};

// 🎁 عند الضغط على صندوق
document.querySelectorAll(".box").forEach(box => {
  box.onclick = () => {

    let random = rewards[Math.floor(Math.random() * rewards.length)];
    result.innerText = "Tu destino: " + random;

    // ✅ إعلان واحد فقط بعد click (safe)
    if (typeof show_11092709 === "function") {
      show_11092709().catch(()=>{});
    }

    // ❌ مهم: ما تستعملش popup + rewarded مع بعض
  };
});
</script>

</body>
</html>
