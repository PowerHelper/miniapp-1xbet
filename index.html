<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>🎮 Plane Game - 1XBET</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="//libtl.com/sdk.js" data-zone="10702733" data-sdk="show_10702733"></script>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(145deg, #0f2027, #203a43, #2c5364);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      color: white;
    }

    .box {
      background: white;
      color: #333;
      padding: 25px;
      border-radius: 15px;
      width: 90%;
      max-width: 380px;
      text-align: center;
      display: none;
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      font-size: 16px;
    }

    button {
      background: #4caf50;
      color: white;
      border: none;
    }

    button:disabled {
      background: gray;
    }

    .promo {
      background: #e3f2fd;
      padding: 8px;
      border-radius: 8px;
      color: #0d47a1;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="box" id="app">
  <h2>🎯 Promo Code</h2>
  <div class="promo">FLY100</div>

  <p>Enter your email:</p>
  <input type="email" id="email" placeholder="example@email.com">

  <button id="btn" disabled>⏳ Please wait...</button>
</div>

<script>
Telegram.WebApp.ready();

const app = document.getElementById("app");
const btn = document.getElementById("btn");

// 🔁 Smart Ad Retry
function showAd(retry = 2) {
  return new Promise((resolve) => {
    function run(r) {
      if (typeof show_10702733 !== "function") return resolve();

      show_10702733().then(resolve).catch(() => {
        if (r > 0) setTimeout(() => run(r - 1), 1500);
        else resolve();
      });
    }
    run(retry);
  });
}

// 🔥 Ad 1 (Entry)
setTimeout(() => {
  showAd().then(() => {
    app.style.display = "block";

    // ⏳ Timer قبل تفعيل الزر
    let time = 5;
    let interval = setInterval(() => {
      btn.innerText = "⏳ Wait " + time + "s";
      time--;

      if (time < 0) {
        clearInterval(interval);
        btn.disabled = false;
        btn.innerText = "🚀 Start Game";
      }
    }, 1000);

  });
}, 1000);


// 📩 Email check
function valid(email) {
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

let locked = false;

// 🔥 Ad 2 (Before redirect)
btn.onclick = () => {
  if (locked) return;
  locked = true;

  let email = document.getElementById("email").value.trim();
  if (!valid(email)) {
    alert("Enter valid email");
    locked = false;
    return;
  }

  btn.disabled = true;
  btn.innerText = "⏳ Loading Ad...";

  showAd().then(() => {
    window.open("https://1xbet.com/game/crash", "_blank");

    // 💰 Ad 3 (Popup extra profit)
    setTimeout(() => {
      show_10702733('pop');
    }, 3000);

    btn.disabled = false;
    btn.innerText = "🚀 Start Game";
    locked = false;
  });
};
</script>

</body>
</html>
