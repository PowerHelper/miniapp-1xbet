<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎁 Tu Destino</title>

<!-- الخطوط من جوجل (لجمالية أكثر) -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<!-- Monetag SDK (لم يتم التعديل عليه) -->
<script src="//libtl.com/sdk.js" data-zone="11092709" data-sdk="show_11092709"></script>

<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: 'Poppins', sans-serif;
    /* خلفية ليلية جذابة تناسب طابع الحظ */
    background: radial-gradient(circle at center, #2b1055, #000000);
    color: #fff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* ستايل الزجاج (Glassmorphism) للمربع الرئيسي */
  .container {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    padding: 40px 30px;
    border-radius: 20px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 15px 35px rgba(0,0,0,0.5);
    text-align: center;
    max-width: 400px;
    width: 90%;
  }

  h1 { 
    font-size: 28px;
    margin-bottom: 30px;
    /* تدرج لوني في النص */
    background: linear-gradient(45deg, #ff9a9e, #fecfef);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0px 4px 15px rgba(255, 154, 158, 0.3);
  }

  button {
    padding: 15px 40px;
    font-size: 20px;
    font-weight: 600;
    border: none;
    border-radius: 50px;
    background: linear-gradient(45deg, #ff4d6d, #ff758c);
    color: white;
    cursor: pointer;
    box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4);
    transition: all 0.3s ease;
    /* حركة النبض لجلب الانتباه */
    animation: pulse 2s infinite;
  }

  button:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 25px rgba(255, 77, 109, 0.6);
  }

  @keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.05); }
    100% { transform: scale(1); }
  }

  .boxes {
    display: none;
    margin-top: 20px;
    justify-content: center;
    gap: 15px;
    flex-wrap: wrap;
    animation: fadeIn 0.6s ease-in-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .box {
    width: 75px;
    height: 75px;
    background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
    border-radius: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 35px;
    cursor: pointer;
    box-shadow: 0 5px 15px rgba(0, 242, 254, 0.3);
    transition: all 0.3s ease;
  }

  .box:hover {
    transform: translateY(-5px) scale(1.1);
    box-shadow: 0 10px 20px rgba(0, 242, 254, 0.6);
  }

  .box:active {
    transform: scale(0.9);
  }

  .result {
    margin-top: 30px;
    font-size: 22px;
    font-weight: 800;
    color: #ffd700; /* لون ذهبي */
    text-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
    min-height: 30px;
    opacity: 0;
    transition: opacity 0.5s ease;
  }

  .result.show {
    opacity: 1;
    animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  @keyframes popIn {
    0% { transform: scale(0.5); }
    100% { transform: scale(1); }
  }
</style>
</head>

<body>

<div class="container">
  <h1>🎡 ¡Descubre tu destino!</h1>

  <button id="start">Girar</button>

  <div class="boxes" id="boxes">
    <div class="box">🎁</div>
    <div class="box">🎁</div>
    <div class="box">🎁</div>
    <div class="box">🎁</div>
  </div>

  <div class="result" id="result"></div>
</div>

<script>
const start = document.getElementById("start");
const boxes = document.getElementById("boxes");
const result = document.getElementById("result");

const rewards = [
  "💖 Amor verdadero",
  "💰 Dinero inesperado",
  "🍀 Mucha suerte",
  "🔥 Éxito total"
];

// ✅ إعلان خفيف (In-App) بعد 5 ثواني (بدون تغيير)
setTimeout(() => {
  if (typeof show_11092709 === "function") {
    show_11092709({
      type: 'inApp',
      inAppSettings: {
        frequency: 1,
        capping: 0.2,
        interval: 60,
        timeout: 5,
        everyPage: false
      }
    });
  }
}, 5000);

// 🎡 زر البداية
start.onclick = () => {
  start.style.display = "none";
  boxes.style.display = "flex";
};

// 🎁 عند الضغط على صندوق
document.querySelectorAll(".box").forEach(box => {
  box.onclick = () => {
    // إخفاء النتيجة السابقة إن وجدت لإعادة الحركة
    result.classList.remove("show");

    setTimeout(() => {
      let random = rewards[Math.floor(Math.random() * rewards.length)];
      result.innerText = "Tu destino: \n" + random;
      result.classList.add("show");
    }, 100);

    // ✅ إعلان واحد فقط بعد click (safe) (بدون تغيير)
    if (typeof show_11092709 === "function") {
      show_11092709().catch(()=>{});
    }

    // ❌ مهم: ما تستعملش popup + rewarded مع بعض
  };
});
</script>

</body>
</html>
