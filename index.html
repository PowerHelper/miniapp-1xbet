<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎁 Tu Destino</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">

<!-- Monetag SDK (مضمون 100%) -->
<script src="//libtl.com/sdk.js" data-zone="11092709" data-sdk="show_11092709"></script>

<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Nunito', sans-serif;
  }

  body {
    background: linear-gradient(135deg, #1a0b2e, #4b1d52);
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  #anime-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-top: 20px;
    z-index: 10;
    height: 300px;
  }

  /* تنسيق المربع اللي هاز Sketchfab باش يبان نقي */
  #anime-model {
    width: 220px;
    height: 220px;
    border-radius: 50%; /* درناه دائري باش يجي زوين */
    overflow: hidden;
    box-shadow: 0 0 20px rgba(0, 242, 254, 0.4);
    border: 4px solid #00f2fe;
    background: #000;
    transition: transform 0.3s ease;
  }

  #anime-model iframe {
    width: 100%;
    height: 100%;
    border: none;
  }

  /* حركة القفز بالفرح */
  .clap-anim {
    animation: jumpJoy 0.5s ease-in-out 2;
  }

  @keyframes jumpJoy {
    0% { transform: translateY(0); }
    50% { transform: translateY(-20px) scale(1.05); }
    100% { transform: translateY(0); }
  }

  .bubble {
    background: rgba(255, 255, 255, 0.95);
    color: #333;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 16px;
    font-weight: 900;
    margin-bottom: 15px;
    max-width: 90%;
    text-align: center;
    position: relative;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
  }

  .bubble::after {
    content: '';
    position: absolute;
    bottom: -10px;
    left: 50%;
    transform: translateX(-50%);
    border-width: 10px 10px 0;
    border-style: solid;
    border-color: rgba(255, 255, 255, 0.95) transparent transparent;
  }

  #game-board {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(10px);
    padding: 15px;
    border-radius: 15px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    margin: 10px 0;
    display: none;
    grid-template-columns: repeat(8, 1fr);
    gap: 8px;
    perspective: 1000px;
  }

  @media (max-width: 600px) {
    #game-board {
      grid-template-columns: repeat(5, 1fr);
      gap: 5px;
      padding: 10px;
    }
  }

  .card {
    width: 45px;
    height: 45px;
    cursor: pointer;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.6s;
  }

  @media (max-width: 600px) {
    .card {
      width: 55px;
      height: 55px;
    }
  }

  .card.is-flipped {
    transform: rotateY(180deg);
  }

  .card-face {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    border-radius: 8px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  }

  .card-front {
    background: linear-gradient(135deg, #a18cd1, #fbc2eb);
    color: transparent;
  }

  .card-front::after {
    content: '🎁';
    color: white;
    font-size: 20px;
  }

  .card-back {
    background: linear-gradient(135deg, #ff9a9e, #fecfef);
    transform: rotateY(180deg);
  }

  #start-btn {
    padding: 15px 40px;
    font-size: 20px;
    font-weight: bold;
    border: none;
    border-radius: 50px;
    background: linear-gradient(45deg, #00f2fe, #4facfe);
    color: white;
    cursor: pointer;
    box-shadow: 0 5px 20px rgba(0, 242, 254, 0.4);
    margin-top: 20px;
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.05); }
    100% { transform: scale(1); }
  }

  footer {
    margin-top: auto;
    padding: 15px;
    font-size: 14px;
    font-weight: bold;
    color: rgba(255, 255, 255, 0.5);
  }
</style>
</head>
<body>

  <div id="anime-container">
    <div class="bubble" id="speech-bubble">
      ¡Hola! ¿Listo para el reto?
    </div>
    
    <!-- تم دمج كود Sketchfab هنا بنجاح مع إخفاء أزرار التحكم والواجهة -->
    <div id="anime-model" class="sketchfab-embed-wrapper">
      <iframe title="Wolfram without coat for VRchat" frameborder="0" allowfullscreen mozallowfullscreen="true" webkitallowfullscreen="true" allow="autoplay; fullscreen; xr-spatial-tracking" xr-spatial-tracking execution-while-out-of-viewport execution-while-not-rendered web-share src="https://sketchfab.com/models/44f413569d2140c2ba4b8b334840bd21/embed?autostart=1&ui_infos=0&ui_controls=0&ui_watermark=0&ui_stop=0&transparent=1"> </iframe>
    </div>

  </div>

  <button id="start-btn">¡Empezar!</button>

  <div id="game-board"></div>

  <footer>@Bigbanglive_bot</footer>

<script>
  const startBtn = document.getElementById("start-btn");
  const gameBoard = document.getElementById("game-board");
  const speechBubble = document.getElementById("speech-bubble");
  const animeModel = document.getElementById("anime-model");
  
  const shapes = ['🍎','🍌','🍇','🍉','🍓','🍒','🍑','🥭','🍍','🥥','🥝','🍅','🍆','🥑','🥦','🌽','🥕','🥔','🍠','🥐'];
  let cardsArray = [...shapes, ...shapes];
  
  let firstCard = null;
  let secondCard = null;
  let lockBoard = false;
  let matchesFound = 0;

  setTimeout(() => {
    if (typeof show_11092709 === "function") {
      show_11092709({
        type: 'inApp',
        inAppSettings: { frequency: 1, capping: 0.2, interval: 60, timeout: 5, everyPage: false }
      });
    }
  }, 5000);

  function initGame() {
    startBtn.style.display = "none";
    gameBoard.style.display = "grid";
    gameBoard.innerHTML = '';
    matchesFound = 0;
    
    cardsArray.sort(() => Math.random() - 0.5);

    cardsArray.forEach((shape) => {
      const card = document.createElement("div");
      card.classList.add("card", "is-flipped");
      card.dataset.shape = shape;

      const cardFront = document.createElement("div");
      cardFront.classList.add("card-face", "card-front");

      const cardBack = document.createElement("div");
      cardBack.classList.add("card-face", "card-back");
      cardBack.innerText = shape;

      card.appendChild(cardFront);
      card.appendChild(cardBack);
      
      card.addEventListener("click", () => flipCard(card));
      gameBoard.appendChild(card);
    });

    startCountdown();
  }

  function startCountdown() {
    let timeLeft = 10;
    lockBoard = true;
    
    let countdownInterval = setInterval(() => {
      speechBubble.innerHTML = `¡Memoriza los pares!<br>Tiempo: ${timeLeft}s`;
      timeLeft--;

      if (timeLeft < 0) {
        clearInterval(countdownInterval);
        hideAllCards();
      }
    }, 1000);
  }

  function hideAllCards() {
    speechBubble.innerHTML = "¡Tu turno! Encuentra los pares.";
    const allCards = document.querySelectorAll('.card');
    allCards.forEach(card => card.classList.remove('is-flipped'));
    lockBoard = false;
  }

  function flipCard(card) {
    if (lockBoard || card === firstCard || card.classList.contains('matched')) return;

    if (typeof show_11092709 === "function") {
      show_11092709().catch(()=>{});
    }

    card.classList.add('is-flipped');

    if (!firstCard) {
      firstCard = card;
      return;
    }

    secondCard = card;
    checkForMatch();
  }

  function checkForMatch() {
    let isMatch = firstCard.dataset.shape === secondCard.dataset.shape;

    if (isMatch) {
      disableCards();
      matchesFound++;
      
      speechBubble.innerHTML = "¡Bravo! 👏👏";
      animeModel.classList.remove('clap-anim');
      void animeModel.offsetWidth;
      animeModel.classList.add('clap-anim');

      if(matchesFound === 20) {
        setTimeout(() => {
          speechBubble.innerHTML = "ايو ايو aregato 🎉🎉";
        }, 500);
      }
    } else {
      unflipCards();
    }
  }

  function disableCards() {
    firstCard.classList.add('matched');
    secondCard.classList.add('matched');
    resetBoard();
  }

  function unflipCards() {
    lockBoard = true;
    setTimeout(() => {
      firstCard.classList.remove('is-flipped');
      secondCard.classList.remove('is-flipped');
      resetBoard();
    }, 1000);
  }

  function resetBoard() {
    [firstCard, secondCard, lockBoard] = [null, null, false];
  }

  startBtn.addEventListener("click", initGame);

</script>
</body>
</html>
