<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✨ Tu Destino Mágico ✨</title>

<!-- خطوط احترافية واضحة -->
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800;900&display=swap" rel="stylesheet">
<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.1.1/model-viewer.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<!-- Monetag SDK (مضمون 100%) -->
<script src="https://libtl.com/sdk.js" data-zone="11092709" data-sdk="show_11092709"></script>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; }

  /* ديزاين ليلي زجاجي (Dark Glass & Neon) */
  body {
    background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  body::after {
    content: ''; position: absolute; top: 10%; left: 50%; width: 300px; height: 300px;
    background: #00f2fe; border-radius: 50%; filter: blur(150px); z-index: -1; opacity: 0.2;
    transform: translateX(-50%);
  }

  #anime-container { display: flex; flex-direction: column; align-items: center; margin-top: 20px; z-index: 10; }

  /* فقاعة النص واضحة ونقية */
  .bubble {
    background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.2);
    color: #00f2fe; padding: 12px 30px; border-radius: 15px; font-size: 18px; font-weight: 800;
    margin-bottom: 10px; text-align: center; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    text-transform: uppercase; letter-spacing: 1px; min-width: 250px;
  }

  #timer-display { color: #00ff66; font-size: 24px; font-weight: 900; text-shadow: 0 0 10px #00ff66; }

  /* مجسم البنت 3D */
  model-viewer {
    width: 220px; height: 240px; background-color: transparent; border: none; outline: none;
    filter: drop-shadow(0 0 15px rgba(0, 242, 254, 0.3));
  }

  .clap-anim { animation: jumpJoy 0.4s ease-in-out 2; }
  @keyframes jumpJoy { 0% { transform: translateY(0); } 50% { transform: translateY(-15px); } 100% { transform: translateY(0); } }

  /* شريط التقدم */
  #progress-container {
    width: 90%; max-width: 400px; height: 8px; background: rgba(255,255,255,0.05);
    border-radius: 10px; margin: 15px 0; display: none; overflow: hidden;
  }
  #progress-bar { width: 0%; height: 100%; background: #00ff66; box-shadow: 0 0 15px #00ff66; transition: width 0.3s ease; }

  /* شبكة اللعب */
  #game-board {
    background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
    padding: 15px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.08);
    box-shadow: 0 15px 35px rgba(0,0,0,0.6);
    margin: 5px 0 25px 0; display: none; grid-template-columns: repeat(8, 1fr); gap: 10px; perspective: 1000px;
  }
  @media (max-width: 600px) { #game-board { grid-template-columns: repeat(5, 1fr); gap: 8px; padding: 12px; } }

  /* البطاقات */
  .card {
    width: 50px; height: 50px; cursor: pointer; position: relative;
    transform-style: preserve-3d; -webkit-transform-style: preserve-3d;
    transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  @media (max-width: 600px) { .card { width: 55px; height: 55px; } }

  /* القلبة 3D */
  .card.is-flipped { transform: rotateY(180deg); -webkit-transform: rotateY(180deg); }

  /* 💡 الحل الجذري لمشكل إختفاء البطاقات فالآيفون: 
     حيدنا الحركة 3D من الأنيميشن باش ماتخربقش المتصفح. دابا درنا غير الضوء! */
  .card.matched .card-back {
    border: 3px solid #00ff66;
    background: rgba(0, 255, 102, 0.1);
    animation: glowOnly 0.6s ease forwards;
  }

  @keyframes glowOnly {
    0% { box-shadow: inset 0 0 10px rgba(0, 242, 254, 0.3); }
    50% { box-shadow: 0 0 25px rgba(0, 255, 102, 0.8), inset 0 0 20px rgba(0, 255, 102, 0.4); background: rgba(0, 255, 102, 0.2); }
    100% { box-shadow: 0 0 15px rgba(0, 255, 102, 0.5); background: rgba(0, 255, 102, 0.1); }
  }

  .card-face {
    position: absolute; width: 100%; height: 100%; backface-visibility: hidden; -webkit-backface-visibility: hidden;
    display: flex; align-items: center; justify-content: center; border-radius: 12px; font-size: 26px;
  }
  
  /* وجه البطاقة المخفي (علامة الاستفهام) */
  .card-front {
    background: rgba(255, 255, 255, 0.05); border: 2px solid rgba(255, 255, 255, 0.1); 
    color: rgba(255, 255, 255, 0.5); font-size: 24px; font-weight: 900;
  }
  
  /* ظهر البطاقة (الشكل دالديسير اللي كيبان ملي كتتقلب) */
  .card-back {
    background: #fff; transform: rotateY(180deg); -webkit-transform: rotateY(180deg);
    border: 2px solid #00f2fe; box-shadow: inset 0 0 10px rgba(0, 242, 254, 0.3);
  }

  /* زر البداية */
  #start-btn {
    padding: 15px 50px; font-size: 22px; font-weight: 900; border: none; border-radius: 50px;
    background: linear-gradient(90deg, #00f2fe, #4facfe); color: white; cursor: pointer;
    box-shadow: 0 10px 25px rgba(0, 242, 254, 0.4); margin-top: 15px; z-index: 20;
    transition: 0.3s; text-transform: uppercase; letter-spacing: 2px;
  }
  #start-btn:hover { transform: scale(1.05); box-shadow: 0 15px 35px rgba(0, 242, 254, 0.6); }

  footer { margin-top: auto; padding: 15px; font-size: 13px; font-weight: bold; color: rgba(255, 255, 255, 0.3); letter-spacing: 2px; }
</style>
</head>
<body>

  <div id="anime-container">
    <div class="bubble" id="speech-bubble">¡Toca para empezar! ✨</div>
    <model-viewer 
      id="anime-model"
      src="https://modelviewer.dev/shared-assets/models/RobotExpressive.glb" 
      autoplay interaction-prompt="none" camera-controls="false" disable-zoom>
    </model-viewer>
  </div>

  <button id="start-btn">¡EMPEZAR!</button>

  <div id="progress-container"><div id="progress-bar"></div></div>
  <div id="game-board"></div>
  <footer>@Bigbanglive_bot</footer>

<script>
  const startBtn = document.getElementById("start-btn");
  const gameBoard = document.getElementById("game-board");
  const speechBubble = document.getElementById("speech-bubble");
  const animeModel = document.getElementById("anime-model");
  const progressContainer = document.getElementById("progress-container");
  const progressBar = document.getElementById("progress-bar");
  
  const shapes = ['🍎','🍌','🍇','🍉','🍓','🍒','🍑','🥭','🍍','🥥','🥝','🍅','🍆','🥑','🥦','🌽','🥕','🥔','🍠','🥐'];
  let cardsArray = [...shapes, ...shapes];
  
  let firstCard = null, secondCard = null, lockBoard = false, matchesFound = 0;
  const totalMatches = 20;

  // 🎵 الصوت المبرمج
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  function playSound(type) {
    if(audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    
    if(type === 'flip') {
      osc.type = 'sine'; osc.frequency.setValueAtTime(500, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.05);
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
      osc.start(); osc.stop(audioCtx.currentTime + 0.05);
    } else if(type === 'match') {
      osc.type = 'square'; osc.frequency.setValueAtTime(400, audioCtx.currentTime);
      osc.frequency.setValueAtTime(800, audioCtx.currentTime + 0.1);
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
      osc.start(); osc.stop(audioCtx.currentTime + 0.2);
    }
  }

  // 🔊 نطق الكلام القوي
  function speak(text, lang) {
    try {
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel(); 
        let msg = new SpeechSynthesisUtterance();
        msg.text = text; msg.lang = lang; msg.rate = 1.1; msg.pitch = 1.4;
        window.speechSynthesis.speak(msg);
      }
    } catch(e) {}
  }

  // 💡 زر البداية: الإعلان الأول كيطلع هنا
  startBtn.addEventListener("click", () => {
    if(audioCtx.state === 'suspended') audioCtx.resume();
    
    // ✅ الإعلان الأول
    try { if (typeof show_11092709 === "function") show_11092709(); } catch(e) {}

    initGame();
  });

  function initGame() {
    startBtn.style.display = "none"; gameBoard.style.display = "grid"; progressContainer.style.display = "block";
    gameBoard.innerHTML = ''; matchesFound = 0; updateProgress(); lockBoard = true; 
    
    speak("Memoriza los pares.", "es-ES");

    cardsArray.sort(() => Math.random() - 0.5);
    cardsArray.forEach((shape) => {
      const card = document.createElement("div");
      // البطاقات كيبداو محلولين
      card.classList.add("card", "is-flipped"); 
      card.dataset.shape = shape;

      const cardFront = document.createElement("div"); cardFront.classList.add("card-face", "card-front"); cardFront.innerText = "?";
      const cardBack = document.createElement("div"); cardBack.classList.add("card-face", "card-back"); cardBack.innerText = shape;

      card.appendChild(cardFront); card.appendChild(cardBack);
      card.addEventListener("click", () => flipCard(card));
      gameBoard.appendChild(card);
    });

    startCountdown();
  }

  function startCountdown() {
    let timeLeft = 10;
    speechBubble.innerHTML = `¡Memoriza! <span id="timer-display">${timeLeft}</span>s`;
    
    let countdownInterval = setInterval(() => {
      timeLeft--;
      speechBubble.innerHTML = `¡Memoriza! <span id="timer-display">${timeLeft}</span>s`;
      if (timeLeft <= 0) {
        clearInterval(countdownInterval);
        hideAllCards(); 
      }
    }, 1000);
  }

  function hideAllCards() {
    speak("¡A jugar!", "es-ES");
    speechBubble.innerHTML = "¡Encuentra los pares! 🎮";
    document.querySelectorAll('.card').forEach(card => card.classList.remove('is-flipped'));
    lockBoard = false; 
  }

  function flipCard(card) {
    if (lockBoard || card === firstCard || card.classList.contains('matched')) return;

    playSound('flip');
    card.classList.add('is-flipped'); 

    if (!firstCard) { firstCard = card; return; }

    secondCard = card;
    checkForMatch();
  }

  function checkForMatch() {
    if (firstCard.dataset.shape === secondCard.dataset.shape) {
      // إذا كانو صحاح كنزيدو كلاس matched
      firstCard.classList.add('matched');
      secondCard.classList.add('matched');
      
      matchesFound++; updateProgress();
      
      speechBubble.innerHTML = "¡Bien! ✨";
      playSound('match');

      animeModel.classList.remove('clap-anim'); void animeModel.offsetWidth; animeModel.classList.add('clap-anim');

      if(matchesFound === totalMatches) {
        setTimeout(() => {
          speechBubble.innerHTML = "¡Ayo ayo, arigato! 🏆";
          speak("Ayo ayo, arigato gozaimasu", "ja-JP");
          fireConfetti();
          
          // ✅ الإعلان الثاني والأخير (فالنهاية)
          try { if (typeof show_11092709 === "function") show_11092709(); } catch(e) {}
          
        }, 600);
      }
      
      resetBoard(); // باش يكمل اللعب بلا ما يتسدو
    } else {
      unflipCards();
    }
  }

  function updateProgress() {
    progressBar.style.width = ((matchesFound / totalMatches) * 100) + "%";
  }

  function fireConfetti() {
    try {
      var end = Date.now() + 4000;
      (function frame() {
        confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#00ff66', '#00f2fe', '#ffffff'] });
        confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#00ff66', '#00f2fe', '#ffffff'] });
        if (Date.now() < end) requestAnimationFrame(frame);
      }());
    } catch(e) {}
  }

  function unflipCards() {
    lockBoard = true;
    setTimeout(() => {
      // إيلا كانو غالطين كنعاودو نسدوهم
      firstCard.classList.remove('is-flipped'); secondCard.classList.remove('is-flipped'); resetBoard();
    }, 600);
  }

  function resetBoard() { [firstCard, secondCard, lockBoard] = [null, null, false]; }

</script>
</body>
</html>
