<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>🎮 Juego del Avión - 1XBET</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- Anuncio -->
  <script src="//libtl.com/sdk.js" data-zone="9585009" data-sdk="show_9585009"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: linear-gradient(145deg, #0f2027, #203a43, #2c5364);
      color: white;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      background: white;
      color: #333;
      padding: 30px;
      border-radius: 20px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 0 20px rgba(0,0,0,0.2);
      display: none;
    }

    h1 {
      color: #0d47a1;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 15px 0;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      background-color: #4caf50;
      color: white;
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      cursor: pointer;
      width: 100%;
    }

    button:hover {
      background-color: #388e3c;
    }

    .promo {
      background: #e3f2fd;
      padding: 10px;
      border-radius: 10px;
      color: #0d47a1;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div class="container" id="mainContent">

    <h1>🎯 ¡Tu código promocional!</h1>

    <p class="promo">FLY100</p>

    <p>📩 Introduce tu correo electrónico para empezar a jugar:</p>

    <input type="email" id="email" placeholder="ejemplo@email.com" required />

    <button id="startBtn">🚀 Empezar a jugar</button>

  </div>

  <script>
    Telegram.WebApp.ready();

    // Intentar mostrar anuncio
    function showAd() {
      return new Promise((resolve, reject) => {
        if (typeof show_9585009 === "function") {
          show_9585009()
            .then(resolve)
            .catch(reject);
        } else {
          console.warn("La función show_9585009 no existe.");
          resolve();
        }
      });
    }

    showAd()
      .then(() => {
        document.getElementById("mainContent").style.display = "block";
      })
      .catch(() => {
        alert("❌ No se pudo mostrar el anuncio. Inténtalo nuevamente.");
        document.getElementById("mainContent").style.display = "block";
      });

    function validateEmail(email) {
      const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      return re.test(email);
    }

    document.getElementById("startBtn").addEventListener("click", () => {
      const email = document.getElementById("email").value.trim();

      if (!validateEmail(email)) {
        alert("⚠️ Por favor introduce un correo electrónico válido.");
        return;
      }

      window.open("https://1xbet.com/game/crash", "_blank");
    });
  </script>

</body>
</html>
