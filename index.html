<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎁 Tu Destino Mágico</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">

<!-- مكتبة جوجل لعرض مجسمات 3D -->
<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.1.1/model-viewer.min.js"></script>

<!-- مكتبة الورق الملون (Confetti) للاحتفال -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<!-- Monetag SDK (مصحح ليقرأ من جميع السيرفرات) -->
<script src="https://libtl.com/sdk.js" data-zone="11092709" data-sdk="show_11092709"></script>

<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Nunito', sans-serif;
  }

  body {
    background: linear-gradient(-45deg, #1a0b2e, #4b1d52, #2a0845, #6441A5);
    background-size: 400% 400%;
    animation: gradientBG 15s ease infinite;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  @keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  #anime-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-top: 15px;
    z-index: 10;
  }

  model-viewer {
    width: 250px;
    height: 280px;
    background-color: transparent;
    border: none;
    outline: none;
    transition: transform 0.3s ease;
    filter: drop-shadow(0 0 20px rgba(255, 105, 180, 0.4));
  }

  .clap-anim {
    animation: jumpJoy 0.5s ease-in-out 2;
  }

  @keyframes jumpJoy {
    0% { transform: translateY(0); }
    50% { transform: translateY(-25px) scale(1.05); }
    100% { transform: translateY(0); }
  }

  .bubble {
    background: rgba(255, 255, 255, 0.95);
    color: #ff4d6d;
    padding: 12px 25px;
    border-radius: 30px;
    font-size: 18px;
    font-weight: 900;
    margin-bottom: 10px;
    max-width: 90%;
    text-align: center;
    position: relative;
    box-shadow: 0 8px 20px rgba(0,0,0,0.4);
    border: 2px solid #ff9a9e;
  }

  .bubble::after {
    content: '';
    position: absolute;
    bottom: -12px;
    left: 50%;
    transform: translateX(-50%);
    border-width: 12px 12px 0;
    border-style: solid;
    border-color: #ff9a9e transparent transparent;
  }
  .bubble::before {
    content: '';
    position: absolute;
    bottom: -9px;
    left: 50%;
    transform: translateX(-50%);
    border-width: 10px 10px 0;
    border-style: solid;
    border-color: rgba(255, 255, 255, 0.95) transparent transparent;
    z-index: 1;
  }

  #progress-container {
    width: 90%;
    max-width: 400px;
    height: 18px;
    background: rgba(0,0,0,0.4);
    border-radius: 20px;
    margin: 10px 0;
    overflow: hidden;
    display: none;
    border: 2px solid rgba(255, 255, 255, 0.2);
    box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
  }

  #progress-bar {
    width: 0%;
    height: 100%;
    background: linear-gradient(90deg, #ff9a9e, #fecfef, #ff9a9e);
    background-size: 200% 100%;
    animation: flowBar 2s linear infinite;
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }

  @keyframes flowBar {
    0% { background-position: 100% 0; }
    100% { background-position: -100% 0; }
  }

  #game-board {
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(12px);
    padding: 15px;
    border-radius: 20px;
    border: 1px solid rgba(255, 255, 255, 0.15);
    box-shadow: 0 15px 35px rgba(0,0,0,0.6);
    margin: 5px 0 20px 0;
    display: none;
    grid-template-columns: repeat(8, 1fr);
    gap: 10px;
    perspective: 1000px;
  }

  @media (max-width: 600px) {
    #game-board {
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
      padding: 12px;
    }
  }

  .card {
    width: 48px;
    height: 48px;
    cursor: pointer;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
  }

  @media (max-width: 600px) {
    .card { width: 55px; height: 55px; }
  }

  .card:hover {
    transform: scale(1.05);
  }

  .card.is-flipped {
    transform: rotateY(180deg);
  }

  .card.matched {
    animation: matchGlow 0.8s ease forwards;
  }

  @keyframes matchGlow {
    0% { transform: rotateY(180deg) scale(1); box-shadow: 0 0 0 rgba(0, 255, 0, 0); }
    50% { transform: rotateY(180deg) scale(1.1); box-shadow: 0 0 20px rgba(50, 255, 50, 0.8); }
    100% { transform: rotateY(180deg) scale(0.95); opacity: 0.8; }
  }

  .card-face {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    border-radius: 12px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
  }

  .card-front {
    background: radial-gradient(circle, #fff, #ffe6f2);
  }

  .card-back {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    transform: rotateY(180deg);
    border: 2px solid rgba(255, 255, 255, 0.2);
  }

  .card-back::after {
    content: '?';
    color: rgba(255, 255, 255, 0.7);
    font-size: 28px;
    font-weight: 900;
  }

  #start-btn {
    padding: 15px 50px;
    font-size: 22px;
    font-weight: 900;
    border: none;
    border-radius: 50px;
    background: linear-gradient(45deg, #ff0844 0%, #ffb199 100%);
    color: white;
    cursor: pointer;
    box-shadow: 0 8px 25px rgba(255, 8, 68, 0.5);
    margin-top: -10px;
    z-index: 20;
    transition: all 0.3s;
    animation: pulse 1.5s infinite;
  }

  #start-btn:hover {
    transform: scale(1.1);
    box-shadow: 0 12px 30px rgba(255, 8, 68, 0.7);
  }

  @keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.05); }
    100% { transform: scale(1); }
  }

  footer {
    margin-top: auto;
    padding: 15px;
    font-size: 15px;
    font-weight: bold;
    color: rgba(255, 255, 255, 0.6);
    letter-spacing: 1px;
  }
</style>
</head>
<body>

  <div id="anime-container">
    <div class="bubble" id="speech-bubble">
      ¡Hola! ¿Listo para jugar? ✨
    </div>
    
    <model-viewer 
      id="anime-model"
      src="https://modelviewer.dev/shared-assets/models/RobotExpressive.glb" 
      autoplay
      interaction-prompt="none"
      camera-controls="false"
      disable-zoom>
    </model-viewer>
  </div>

  <button id="start-btn">¡Empezar!</button>

  <div id="progress-container">
    <div id="progress-bar"></div>
  </div>

  <div id="game-board"></div>

  <footer>@Bigbanglive_bot</footer>

<script>
  const startBtn = document.getElementById("start-btn");
  const gameBoard = document.getElementById("game-board");
  const speechBubble = document.getElementById("speech-bubble");
  const animeModel = document.getElementById("anime-model");
  const progressContainer = document.getElementById("progress-container");
  const progressBar = document.getElementById("progress-bar");
  
  const shapes = ['🍎','🍌','🍇','🍉','🍓','🍒','🍑','🥭','🍍','🥥','🥝','🍅','🍆','🥑','🥦','🌽','🥕','🥔','🍠','🥐'];
  let cardsArray = [...shapes, ...shapes];
  
  let firstCard = null;
  let secondCard = null;
  let lockBoard = false;
  let matchesFound = 0;
  const totalMatches = 20;

  // 🔊 دالة نطق الصوت (محمية باش ماتحبسش الكود)
  function speak(text, lang) {
    try {
      if ('speechSynthesis' in window) {
        let msg = new SpeechSynthesisUtterance();
        msg.text = text;
        msg.lang = lang;
        msg.rate = 1.1;
        msg.pitch = 1.5;
        window.speechSynthesis.speak(msg);
      }
    } catch(e) { console.log("Speech error"); }
  }

  // ✅ إعلان In-App بعد 5 ثواني (محمي بـ try-catch)
  setTimeout(() => {
    try {
      if (typeof show_11092709 === "function") {
        show_11092709({
          type: 'inApp',
          inAppSettings: { frequency: 1, capping: 0.2, interval: 60, timeout: 5, everyPage: false }
        });
      }
    } catch(e) {}
  }, 5000);

  function initGame() {
    startBtn.style.display = "none";
    gameBoard.style.display = "grid";
    progressContainer.style.display = "block";
    gameBoard.innerHTML = '';
    matchesFound = 0;
    updateProgress();
    
    speak("¡Hola! Encuentra los pares.", "es-ES");

    cardsArray.sort(() => Math.random() - 0.5);

    cardsArray.forEach((shape) => {
      const card = document.createElement("div");
      card.classList.add("card", "is-flipped");
      card.dataset.shape = shape;

      const cardFront = document.createElement("div");
      cardFront.classList.add("card-face", "card-front");
      cardFront.innerText = shape;

      const cardBack = document.createElement("div");
      cardBack.classList.add("card-face", "card-back");

      card.appendChild(cardFront);
      card.appendChild(cardBack);
      
      card.addEventListener("click", () => flipCard(card));
      gameBoard.appendChild(card);
    });

    startCountdown();
  }

  function startCountdown() {
    let timeLeft = 10;
    lockBoard = true;
    
    let countdownInterval = setInterval(() => {
      speechBubble.innerHTML = `¡Memoriza rápido! ⏱️ ${timeLeft}s`;
      timeLeft--;

      if (timeLeft < 0) {
        clearInterval(countdownInterval);
        hideAllCards();
      }
    }, 1000);
  }

  function hideAllCards() {
    speechBubble.innerHTML = "¡A jugar! 🎮";
    const allCards = document.querySelectorAll('.card');
    allCards.forEach(card => card.classList.remove('is-flipped'));
    lockBoard = false;
  }

  function flipCard(card) {
    if (lockBoard || card === firstCard || card.classList.contains('matched')) return;

    // ✅ إعلان Monetag مع كل كليكة (محمي بـ try-catch باش عمره يحبس اللعبة)
    try {
      if (typeof show_11092709 === "function") {
        show_11092709(); 
      }
    } catch(e) {}

    card.classList.add('is-flipped');

    if (!firstCard) {
      firstCard = card;
      return;
    }

    secondCard = card;
    checkForMatch();
  }

  function checkForMatch() {
    let isMatch = firstCard.dataset.shape === secondCard.dataset.shape;

    if (isMatch) {
      disableCards();
      matchesFound++;
      updateProgress();
      
      speechBubble.innerHTML = "¡Excelente! ✨";
      speak("¡Bravo!", "es-ES");

      animeModel.classList.remove('clap-anim');
      void animeModel.offsetWidth;
      animeModel.classList.add('clap-anim');

      if(matchesFound === totalMatches) {
        setTimeout(() => {
          speechBubble.innerHTML = "¡Ayo ayo, arigato! 🏆";
          speak("Ayo ayo, arigato gozaimasu", "ja-JP");
          fireConfetti();
        }, 500);
      }
    } else {
      unflipCards();
    }
  }

  function updateProgress() {
    let percentage = (matchesFound / totalMatches) * 100;
    progressBar.style.width = percentage + "%";
  }

  function fireConfetti() {
    try {
      var duration = 3000;
      var end = Date.now() + duration;

      (function frame() {
        confetti({
          particleCount: 5,
          angle: 60,
          spread: 55,
          origin: { x: 0 },
          colors: ['#ff0844', '#ffb199', '#00f2fe']
        });
        confetti({
          particleCount: 5,
          angle: 120,
          spread: 55,
          origin: { x: 1 },
          colors: ['#ff0844', '#ffb199', '#00f2fe']
        });

        if (Date.now() < end) {
          requestAnimationFrame(frame);
        }
      }());
    } catch(e) {}
  }

  function disableCards() {
    firstCard.classList.add('matched');
    secondCard.classList.add('matched');
    resetBoard();
  }

  function unflipCards() {
    lockBoard = true;
    setTimeout(() => {
      firstCard.classList.remove('is-flipped');
      secondCard.classList.remove('is-flipped');
      resetBoard();
    }, 1000);
  }

  function resetBoard() {
    [firstCard, secondCard, lockBoard] = [null, null, false];
  }

  startBtn.addEventListener("click", initGame);

</script>
</body>
</html>
