<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>🎮 Juego Avión - Promo</title>

  <!-- Telegram WebApp -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- Monetag SDK -->
  <script src="//libtl.com/sdk.js" data-zone="10702733" data-sdk="show_10702733"></script>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(145deg, #0f2027, #203a43, #2c5364);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      color: white;
    }

    .box {
      background: white;
      color: #333;
      padding: 25px;
      border-radius: 15px;
      width: 90%;
      max-width: 380px;
      text-align: center;
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      font-size: 16px;
    }

    button {
      background: #4caf50;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:disabled {
      background: gray;
    }

    .promo {
      background: #e3f2fd;
      padding: 8px;
      border-radius: 8px;
      color: #0d47a1;
      font-weight: bold;
    }

    .note {
      font-size: 12px;
      color: #777;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>🎯 Código Promocional</h2>
  <div class="promo">FLY100</div>

  <p>Introduce tu correo electrónico:</p>
  <input type="email" id="email" placeholder="ejemplo@email.com">

  <button id="btn">🚀 Empezar</button>

  <div class="note">
    Oferta disponible por tiempo limitado ⏳
  </div>
</div>

<script>
Telegram.WebApp.ready();

const btn = document.getElementById("btn");

// Validación email
function validar(email) {
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

// Click principal
btn.onclick = () => {
  let email = document.getElementById("email").value.trim();

  if (!validar(email)) {
    alert("Por favor introduce un email válido");
    return;
  }

  btn.disabled = true;
  btn.innerText = "⏳ Cargando...";

  // ✅ إعلان واحد فقط بعد click
  if (typeof show_10702733 === "function") {
    show_10702733().finally(() => {

      // Redirect طبيعي
      window.open("https://1xbet.com/game/crash", "_blank");

      btn.disabled = false;
      btn.innerText = "🚀 Empezar";
    });
  } else {
    window.open("https://1xbet.com/game/crash", "_blank");
  }
};
</script>

</body>
</html>
