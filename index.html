<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✨ Tu Destino Mágico ✨</title>

<!-- خطوط احترافية -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">

<!-- مكتبة جوجل لعرض مجسمات 3D -->
<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.1.1/model-viewer.min.js"></script>

<!-- مكتبة الاحتفال (Confetti) -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<!-- Monetag SDK (مضمون 100%) -->
<script src="https://libtl.com/sdk.js" data-zone="11092709" data-sdk="show_11092709"></script>

<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Poppins', sans-serif;
  }

  /* ديزاين ليلي احترافي (Dark Neon Theme) */
  body {
    background: radial-gradient(circle at 50% 0%, #3a1c71, #d76d77, #ffaf7b);
    background-color: #0f0c29;
    background-blend-mode: multiply;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  #anime-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-top: 20px;
    z-index: 10;
  }

  /* منصة متوهجة للشخصية 3D */
  .pedestal {
    position: relative;
    display: flex;
    justify-content: center;
  }

  .pedestal::after {
    content: '';
    position: absolute;
    bottom: 10px;
    width: 150px;
    height: 20px;
    background: rgba(0, 242, 254, 0.4);
    border-radius: 50%;
    filter: blur(15px);
    z-index: -1;
    animation: glowPulse 2s infinite alternate;
  }

  @keyframes glowPulse {
    0% { transform: scale(1); opacity: 0.5; }
    100% { transform: scale(1.2); opacity: 1; }
  }

  model-viewer {
    width: 250px;
    height: 280px;
    background-color: transparent;
    border: none;
    outline: none;
    filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.2));
  }

  .clap-anim {
    animation: jumpJoy 0.5s ease-in-out 2;
  }

  @keyframes jumpJoy {
    0% { transform: translateY(0); }
    50% { transform: translateY(-25px); }
    100% { transform: translateY(0); }
  }

  /* فقاعة النص ستايل عصري زجاجي */
  .bubble {
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(15px);
    border: 1px solid rgba(255, 255, 255, 0.3);
    color: #fff;
    padding: 12px 30px;
    border-radius: 20px;
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 15px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    text-shadow: 0 2px 5px rgba(0,0,0,0.5);
  }

  /* شريط التقدم بتصميم نيون */
  #progress-container {
    width: 90%;
    max-width: 400px;
    height: 14px;
    background: rgba(0,0,0,0.6);
    border-radius: 20px;
    margin: 10px 0;
    display: none;
    box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
    border: 1px solid rgba(255, 255, 255, 0.1);
  }

  #progress-bar {
    width: 0%;
    height: 100%;
    background: linear-gradient(90deg, #00f2fe, #4facfe, #00f2fe);
    background-size: 200% 100%;
    border-radius: 20px;
    box-shadow: 0 0 15px #00f2fe;
    animation: flowBar 2s linear infinite;
    transition: width 0.5s ease;
  }

  @keyframes flowBar {
    0% { background-position: 100% 0; }
    100% { background-position: -100% 0; }
  }

  /* شبكة اللعبة */
  #game-board {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(12px);
    padding: 15px;
    border-radius: 20px;
    border: 1px solid rgba(255, 255, 255, 0.15);
    box-shadow: 0 20px 50px rgba(0,0,0,0.8);
    margin: 5px 0 25px 0;
    display: none;
    grid-template-columns: repeat(8, 1fr);
    gap: 10px;
    perspective: 1000px;
  }

  @media (max-width: 600px) {
    #game-board {
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      padding: 12px;
    }
  }

  .card {
    width: 48px;
    height: 48px;
    cursor: pointer;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  @media (max-width: 600px) {
    .card { width: 55px; height: 55px; }
  }

  .card:hover {
    transform: scale(1.08);
  }

  .card.is-flipped {
    transform: rotateY(180deg);
  }

  .card.matched {
    animation: matchGlow 0.8s ease forwards;
  }

  @keyframes matchGlow {
    0% { transform: rotateY(180deg) scale(1); box-shadow: 0 0 0 rgba(0,0,0,0); }
    50% { transform: rotateY(180deg) scale(1.15); box-shadow: 0 0 25px #00f2fe; }
    100% { transform: rotateY(180deg) scale(0.95); opacity: 0.8; }
  }

  .card-face {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 12px;
  }

  /* وجه البطاقة المخفي (علامة الاستفهام بتصميم زجاجي) */
  .card-front {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255, 255, 255, 0.2);
    color: #00f2fe;
    font-size: 28px;
    font-weight: 900;
    text-shadow: 0 0 10px rgba(0, 242, 254, 0.8);
    box-shadow: 0 8px 15px rgba(0,0,0,0.3);
  }

  /* ظهر البطاقة (اللي فيه الشكل) */
  .card-back {
    background: rgba(255, 255, 255, 0.95);
    transform: rotateY(180deg);
    border: 2px solid #00f2fe;
    font-size: 26px;
    box-shadow: inset 0 0 15px rgba(0, 242, 254, 0.2), 0 8px 15px rgba(0,0,0,0.3);
  }

  /* زر البداية */
  #start-btn {
    padding: 15px 50px;
    font-size: 22px;
    font-weight: 900;
    border: none;
    border-radius: 50px;
    background: linear-gradient(45deg, #ff0844 0%, #ffb199 100%);
    color: white;
    cursor: pointer;
    box-shadow: 0 10px 30px rgba(255, 8, 68, 0.6);
    margin-top: 10px;
    z-index: 20;
    transition: all 0.3s;
    text-transform: uppercase;
    letter-spacing: 2px;
    animation: pulse 2s infinite;
  }

  #start-btn:hover {
    transform: scale(1.1) translateY(-5px);
    box-shadow: 0 15px 40px rgba(255, 8, 68, 0.8);
  }

  @keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.05); }
    100% { transform: scale(1); }
  }

  footer {
    margin-top: auto;
    padding: 20px;
    font-size: 15px;
    font-weight: bold;
    color: rgba(255, 255, 255, 0.4);
    letter-spacing: 2px;
  }
</style>
</head>
<body>

  <div id="anime-container">
    <div class="bubble" id="speech-bubble">
      ¡Hola! ¿Listo para jugar? ✨
    </div>
    
    <div class="pedestal">
      <model-viewer 
        id="anime-model"
        src="https://modelviewer.dev/shared-assets/models/RobotExpressive.glb" 
        autoplay
        interaction-prompt="none"
        camera-controls="false"
        disable-zoom>
      </model-viewer>
    </div>
  </div>

  <button id="start-btn">¡Empezar!</button>

  <div id="progress-container">
    <div id="progress-bar"></div>
  </div>

  <div id="game-board"></div>

  <footer>@Bigbanglive_bot</footer>

<script>
  const startBtn = document.getElementById("start-btn");
  const gameBoard = document.getElementById("game-board");
  const speechBubble = document.getElementById("speech-bubble");
  const animeModel = document.getElementById("anime-model");
  const progressContainer = document.getElementById("progress-container");
  const progressBar = document.getElementById("progress-bar");
  
  const shapes = ['🍎','🍌','🍇','🍉','🍓','🍒','🍑','🥭','🍍','🥥','🥝','🍅','🍆','🥑','🥦','🌽','🥕','🥔','🍠','🥐'];
  let cardsArray = [...shapes, ...shapes];
  
  let firstCard = null;
  let secondCard = null;
  let lockBoard = false;
  let matchesFound = 0;
  const totalMatches = 20;

  // 🔊 دالة نطق الصوت
  function speak(text, lang) {
    try {
      if ('speechSynthesis' in window) {
        let msg = new SpeechSynthesisUtterance();
        msg.text = text;
        msg.lang = lang;
        msg.rate = 1.1;
        msg.pitch = 1.5;
        window.speechSynthesis.speak(msg);
      }
    } catch(e) {}
  }

  // ✅ إعلان In-App بعد 5 ثواني
  setTimeout(() => {
    try {
      if (typeof show_11092709 === "function") {
        show_11092709({
          type: 'inApp',
          inAppSettings: { frequency: 1, capping: 0.2, interval: 60, timeout: 5, everyPage: false }
        });
      }
    } catch(e) {}
  }, 5000);

  function initGame() {
    startBtn.style.display = "none";
    gameBoard.style.display = "grid";
    progressContainer.style.display = "block";
    gameBoard.innerHTML = '';
    matchesFound = 0;
    updateProgress();
    lockBoard = false; // يقدر يكليكي مباشرة
    
    speak("¡A jugar! Encuentra los pares.", "es-ES");
    speechBubble.innerHTML = "¡A jugar! 🎮";

    cardsArray.sort(() => Math.random() - 0.5);

    cardsArray.forEach((shape) => {
      const card = document.createElement("div");
      // 💡 هنا البطاقات كيتكرياو بلا is-flipped باش يبقاو مخفيين من الدقة الأولى
      card.classList.add("card"); 
      card.dataset.shape = shape;

      // وجه البطاقة المخفي (علامة الاستفهام ?)
      const cardFront = document.createElement("div");
      cardFront.classList.add("card-face", "card-front");
      cardFront.innerText = "?";

      // ظهر البطاقة (فيه الشكل دالديسير)
      const cardBack = document.createElement("div");
      cardBack.classList.add("card-face", "card-back");
      cardBack.innerText = shape;

      card.appendChild(cardFront);
      card.appendChild(cardBack);
      
      card.addEventListener("click", () => flipCard(card));
      gameBoard.appendChild(card);
    });
  }

  function flipCard(card) {
    if (lockBoard || card === firstCard || card.classList.contains('matched')) return;

    // ✅ إعلان Monetag مع كل كليكة
    try {
      if (typeof show_11092709 === "function") {
        show_11092709(); 
      }
    } catch(e) {}

    card.classList.add('is-flipped'); // كنقلبو البطاقة باش يبان الديسير

    if (!firstCard) {
      firstCard = card;
      return;
    }

    secondCard = card;
    checkForMatch();
  }

  function checkForMatch() {
    let isMatch = firstCard.dataset.shape === secondCard.dataset.shape;

    if (isMatch) {
      disableCards();
      matchesFound++;
      updateProgress();
      
      speechBubble.innerHTML = "¡Excelente! ✨";
      speak("¡Bravo!", "es-ES");

      animeModel.classList.remove('clap-anim');
      void animeModel.offsetWidth;
      animeModel.classList.add('clap-anim');

      if(matchesFound === totalMatches) {
        setTimeout(() => {
          speechBubble.innerHTML = "¡Ayo ayo, arigato! 🏆";
          speak("Ayo ayo, arigato gozaimasu", "ja-JP");
          fireConfetti();
        }, 500);
      }
    } else {
      unflipCards();
    }
  }

  function updateProgress() {
    let percentage = (matchesFound / totalMatches) * 100;
    progressBar.style.width = percentage + "%";
  }

  function fireConfetti() {
    try {
      var duration = 4000;
      var end = Date.now() + duration;

      (function frame() {
        confetti({
          particleCount: 7,
          angle: 60,
          spread: 70,
          origin: { x: 0 },
          colors: ['#00f2fe', '#ff0844', '#ffb199', '#ffffff']
        });
        confetti({
          particleCount: 7,
          angle: 120,
          spread: 70,
          origin: { x: 1 },
          colors: ['#00f2fe', '#ff0844', '#ffb199', '#ffffff']
        });

        if (Date.now() < end) {
          requestAnimationFrame(frame);
        }
      }());
    } catch(e) {}
  }

  function disableCards() {
    firstCard.classList.add('matched');
    secondCard.classList.add('matched');
    resetBoard();
  }

  function unflipCards() {
    lockBoard = true;
    setTimeout(() => {
      firstCard.classList.remove('is-flipped'); // كنرجعو نسدوهم
      secondCard.classList.remove('is-flipped');
      resetBoard();
    }, 1000);
  }

  function resetBoard() {
    [firstCard, secondCard, lockBoard] = [null, null, false];
  }

  startBtn.addEventListener("click", initGame);

</script>
</body>
</html>
